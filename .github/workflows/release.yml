name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            ext: ''
          - os: macos-latest
            target: darwin-x64
            ext: ''
          - os: macos-14
            target: darwin-arm64
            ext: ''
          - os: windows-latest
            target: win-x64
            ext: '.exe'

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Run tests
        run: npm run test

      - name: Package binary
        run: npx pkg dist/cli/index.js --target node22-${{ matrix.target }} --output quorum-${{ matrix.target }}${{ matrix.ext }} --compress GZip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: quorum-${{ matrix.target }}
          path: quorum-${{ matrix.target }}${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
