name: html-report
classification: capability
version: 0.5.0
description: "HTML report generation quality evaluation"

evals:
  - name: output-quality
    prompt: prompt-1.md
    expected: expected-1.md
    criteria:
      - "Valid HTML5 structure with doctype, head, and body"
      - "Responsive layout that works on desktop and mobile viewports"
      - "Data sourced from SQLite event store or audit_history"
      - "Interactive elements (sortable tables, collapsible sections, or charts)"
      - "Includes embedded CSS styling (no external dependencies)"
      - "Verdict history, fitness trends, and domain coverage all represented"
      - "Self-contained single-file HTML (opens without a server)"
    timeout: 60000

parity:
  enabled: true
  description: "Tests if model can perform equally well without this skill"

benchmark:
  model_baseline: "claude-sonnet-4-6"
  metrics:
    - output_quality
    - model_parity
