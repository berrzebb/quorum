name: implementer
classification: capability
version: 0.4.5
description: "Implementation protocol compliance and code quality evaluation"

evals:
  - name: output-quality
    prompt: prompt-1.md
    expected: expected-1.md
    criteria:
      - "Follows 8-step execution flow: Setup, Understand, Implement, Verify, RTM, Submit, Wait, Commit"
      - "Runs audit_scan for zero-token pre-validation before submission"
      - "Submits evidence via audit_submit with correct trigger_tag"
      - "Completion gate 6 conditions are met before declaring done"
      - "Only modifies files listed in targetFiles"
      - "Correction round protocol followed on audit failure"
      - "Evidence includes all 5 sections: Claim, Changed Files, Test Command, Test Result, Residual Risk"
    timeout: 60000

parity:
  enabled: true
  description: "Tests if model can perform equally well without this skill"

benchmark:
  model_baseline: "claude-sonnet-4-6"
  metrics:
    - output_quality
    - model_parity
