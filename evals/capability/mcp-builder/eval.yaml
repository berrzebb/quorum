name: mcp-builder
classification: capability
version: 0.4.5
description: "MCP tool creation quality evaluation"

evals:
  - name: output-quality
    prompt: prompt-1.md
    expected: expected-1.md
    criteria:
      - "Tool function follows toolXxx naming convention"
      - "Returns {text, summary, json?, error?} format"
      - "Registered in TOOL_NAMES mapping"
      - "Handles errors gracefully with try/catch and meaningful error messages"
      - "Includes parameter validation for all inputs"
      - "Supports scan-ignore pragma where applicable"
      - "Function signature matches existing tool patterns in core/tools/"
    timeout: 60000

parity:
  enabled: true
  description: "Tests if model can perform equally well without this skill"

benchmark:
  model_baseline: "claude-sonnet-4-6"
  metrics:
    - output_quality
    - model_parity
