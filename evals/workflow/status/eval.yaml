name: status
classification: workflow
version: 0.4.8
description: "Gate status reporting procedure compliance evaluation"

evals:
  - name: status-query-flow
    prompt: prompt-1.md
    expected: expected-1.md
    criteria:
      - "Queries all state from SQLite — not from files"
      - "Presents gate state, pending items, recent verdicts, active locks"
      - "Falls back to audit_history tool if CLI unavailable"
      - "Shows structured summary table format"
    timeout: 60000

parity:
  enabled: false

benchmark:
  model_baseline: "claude-sonnet-4-6"
  metrics:
    - procedure_compliance
